version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: edtech-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=edtech
    networks:
      - edtech-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edtech-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/edtech
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads
    networks:
      - edtech-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edtech-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - edtech-network

volumes:
  mongodb_data:
  uploads_data:

networks:
  edtech-network:
    driver: bridge

